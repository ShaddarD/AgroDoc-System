services:
  postgres:
    image: postgres:15
    container_name: agrodb_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
      POSTGRES_DB: mydb
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agro_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: agrodb_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: shaddar08@gmail.com
      PGADMIN_DEFAULT_PASSWORD: your_strong_password
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agro_network

  agrodb_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrodb_web
    restart: unless-stopped
    environment:
      DEBUG: "False"
      SECRET_KEY: "agrodoc-local-secret-key-change-in-real-production-2026"
      DATABASE_URL: postgresql://postgres:12345@postgres:5432/mydb
      ALLOWED_HOSTS: "*"
      CSRF_TRUSTED_ORIGINS: "http://localhost,http://127.0.0.1,http://192.168.1.71"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://127.0.0.1,http://192.168.1.71"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - agro_network

  agrodb_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agrodb_frontend
    restart: unless-stopped
    networks:
      - agro_network

  agrodb_nginx:
    image: nginx:latest
    container_name: agrodb_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
    depends_on:
      - agrodb_web
      - agrodb_frontend
    networks:
      - agro_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  agro_network:
    driver: bridge
